version: 2
updates:
  # npm — weekly bumps, grouped so security PRs are easy to review.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automerge-candidate"
    groups:
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor:
        dependency-type: "production"
        update-types:
          - "patch"
    # Don't auto-bump critical security primitives — review manually.
    ignore:
      - dependency-name: "plaid"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@simplewebauthn/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@aws-sdk/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "drizzle-orm"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — keep CI runners up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "automerge-candidate"
