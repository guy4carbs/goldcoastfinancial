<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Syne:wght@600;700&display=swap');
    </style>
  </defs>

  <!-- MARK: cx=100 cy=100 r=78 -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#B8962E" stroke-width="1.7"/>
  <circle cx="100" cy="100" r="69" fill="none" stroke="#B8962E" stroke-width="0.55" opacity="0.36"/>

  <!-- Cardinal ticks -->
  <line x1="100" y1="13"  x2="100" y2="4"   stroke="#B8962E" stroke-width="1.1" opacity="0.5"/>
  <line x1="100" y1="187" x2="100" y2="196" stroke="#B8962E" stroke-width="1.1" opacity="0.5"/>
  <line x1="13"  y1="100" x2="4"   y2="100" stroke="#B8962E" stroke-width="1.1" opacity="0.5"/>
  <line x1="187" y1="100" x2="196" y2="100" stroke="#B8962E" stroke-width="1.1" opacity="0.5"/>

  <!-- Pivot -->
  <circle cx="100" cy="22" r="5"   fill="none" stroke="#B8962E" stroke-width="1.5"/>
  <circle cx="100" cy="22" r="2"   fill="#B8962E"/>

  <!-- Left leg + spur -->
  <line x1="100" y1="27"  x2="56"  y2="157" stroke="#B8962E" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="56"  y1="157" x2="50"  y2="173" stroke="#B8962E" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Right leg + spur -->
  <line x1="100" y1="27"  x2="144" y2="157" stroke="#B8962E" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="144" y1="157" x2="150" y2="173" stroke="#B8962E" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Crossbar -->
  <line x1="69"  y1="102" x2="131" y2="102" stroke="#B8962E" stroke-width="1.4" stroke-linecap="square"/>
  <line x1="69"  y1="95"  x2="69"  y2="109" stroke="#B8962E" stroke-width="1.4" stroke-linecap="square"/>
  <line x1="131" y1="95"  x2="131" y2="109" stroke="#B8962E" stroke-width="1.4" stroke-linecap="square"/>

  <!-- Center diamond -->
  <polygon points="100,95 105,102 100,109 95,102" fill="#B8962E"/>

  <!-- Leg graduation ticks -->
  <line x1="90"  y1="64"  x2="79"  y2="76"  stroke="#B8962E" stroke-width="0.9" opacity="0.6" stroke-linecap="square"/>
  <line x1="77"  y1="109" x2="66"  y2="121" stroke="#B8962E" stroke-width="0.9" opacity="0.6" stroke-linecap="square"/>
  <line x1="110" y1="64"  x2="121" y2="76"  stroke="#B8962E" stroke-width="0.9" opacity="0.6" stroke-linecap="square"/>
  <line x1="123" y1="109" x2="134" y2="121" stroke="#B8962E" stroke-width="0.9" opacity="0.6" stroke-linecap="square"/>

  <!-- Pivot arc -->
  <path d="M 84,43 A 20,20 0 0 1 116,43" fill="none" stroke="#B8962E" stroke-width="0.8" opacity="0.45"/>

  <!-- Plumb line -->
  <line x1="100" y1="27"  x2="100" y2="95"  stroke="#B8962E" stroke-width="0.7" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- WORDMARK -->
  <line x1="210" y1="35" x2="210" y2="165" stroke="#B8962E" stroke-width="0.6" opacity="0.28"/>

  <text x="228" y="107"
    font-family="'Cormorant Garamond',Georgia,serif"
    font-size="58" font-weight="300"
    fill="#FFFFFF" letter-spacing="3">COVENANT</text>

  <line x1="230" y1="120" x2="595" y2="120" stroke="#B8962E" stroke-width="0.75"/>

  <text x="230" y="155"
    font-family="'Syne',sans-serif"
    font-size="26" font-weight="600"
    fill="#B8962E" letter-spacing="14">RISK</text>
</svg>
