<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset lifeOS · Gold Coast Financial</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #faf8f3;
        --surface: #ffffff;
        --text: #1a1814;
        --muted: #6b6258;
        --gold: #c8a464;
        --gold-text: #1a1814;
        --border: #e5dfd4;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1814;
          --surface: #24201a;
          --text: #f4ede0;
          --muted: #a89e8c;
          --border: #3a3328;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 520px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px 32px;
        text-align: center;
      }
      h1 {
        font-family: "Tiempos Headline", Georgia, serif;
        font-size: 28px;
        font-weight: 500;
        margin: 0 0 12px;
      }
      p { color: var(--muted); line-height: 1.55; margin: 0 0 16px; font-size: 15px; }
      .step { font-size: 13px; margin: 24px 0 16px; }
      .step span {
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
      }
      .step strong { font-weight: 500; }
      button {
        display: inline-block;
        margin-top: 8px;
        padding: 12px 28px;
        background: var(--gold);
        color: var(--gold-text);
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
      }
      button:disabled { opacity: 0.6; cursor: progress; }
      .success { color: #2f9655; }
      .error { color: #c4523e; }
      pre {
        text-align: left;
        font-size: 11px;
        background: var(--bg);
        padding: 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        overflow-x: auto;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset lifeOS</h1>
      <p>If lifeOS got stuck on an old version and the Update button doesn't open the popup, this page wipes the cached bundle and reloads cleanly.</p>
      <div class="step" id="status">
        <span>Status</span>
        <strong>Ready to reset.</strong>
      </div>
      <button id="reset">Reset and reload</button>
      <pre id="log" hidden></pre>
    </div>
    <script>
      (function () {
        const btn = document.getElementById("reset");
        const status = document.getElementById("status");
        const log = document.getElementById("log");
        const lines = [];

        function setStatus(html, cls) {
          status.innerHTML = '<span>Status</span><strong class="' + (cls || "") + '">' + html + "</strong>";
        }
        function tee(line) {
          lines.push(line);
          log.hidden = false;
          log.textContent = lines.join("\n");
        }

        async function reset() {
          btn.disabled = true;
          setStatus("Working...");
          try {
            // 1. Unregister all service workers on this origin.
            if ("serviceWorker" in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              tee("Found " + regs.length + " service worker(s).");
              for (const reg of regs) {
                try {
                  // Best-effort: tell the SW to wipe its caches before unregister.
                  if (reg.active) {
                    reg.active.postMessage({ type: "LIFEOS_UPDATE" });
                  }
                  await reg.unregister();
                  tee("Unregistered: " + (reg.scope || "(scope?)"));
                } catch (err) {
                  tee("Unregister failed: " + (err && err.message ? err.message : err));
                }
              }
            } else {
              tee("Browser has no Service Worker support — proceeding to cache wipe.");
            }

            // 2. Delete every Cache API namespace on this origin.
            if ("caches" in window) {
              const names = await caches.keys();
              tee("Found " + names.length + " cache namespace(s).");
              for (const name of names) {
                try {
                  await caches.delete(name);
                  tee("Deleted cache: " + name);
                } catch (err) {
                  tee("Cache delete failed: " + name + " :: " + (err && err.message ? err.message : err));
                }
              }
            }

            setStatus("Done. Reloading...", "success");
            // 3. Hard reload with a cache-busting query string so the browser
            //    doesn't pull from the HTTP cache either.
            setTimeout(function () {
              const ts = Date.now();
              window.location.href = "/?lifeos_recovered=" + ts;
            }, 800);
          } catch (err) {
            setStatus("Reset failed. Try clearing site data in your browser settings.", "error");
            tee("Top-level error: " + (err && err.message ? err.message : err));
            btn.disabled = false;
          }
        }

        btn.addEventListener("click", reset);
      })();
    </script>
  </body>
</html>
